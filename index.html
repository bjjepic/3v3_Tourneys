<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3v3 Scrims — Score Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0d0f;
    --surface: #12151a;
    --surface2: #191d24;
    --surface3: #1f242d;
    --border: rgba(255,255,255,0.06);
    --border2: rgba(255,255,255,0.11);
    --text: #dde6f0;
    --text-muted: #6a7a8a;
    --text-dim: #3a4450;
    --blue: #3a8fd1;
    --blue-bg: rgba(58,143,209,0.1);
    --blue-border: rgba(58,143,209,0.3);
    --red: #c94030;
    --red-bg: rgba(201,64,48,0.1);
    --red-border: rgba(201,64,48,0.3);
    --gold: #c49a44;
    --gold-bg: rgba(196,154,68,0.08);
    --green: #2ecc71;
    --danger: #e74c3c;
    --team1: #3a8fd1;
    --team2: #c94030;
    --purple: #9b59b6;
    --purple-bg: rgba(155,89,182,0.1);
    --purple-border: rgba(155,89,182,0.3);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    min-height: 100vh;
    padding: 32px 20px 60px;
  }

  header {
    text-align: center;
    margin-bottom: 36px;
  }

  .header-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 10px;
  }
  .header-line { flex: 1; max-width: 80px; height: 1px; background: linear-gradient(to right, transparent, var(--border2)); }
  .header-line.right { background: linear-gradient(to left, transparent, var(--border2)); }

  header h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(16px, 3.5vw, 26px);
    color: var(--text);
    letter-spacing: 3px;
  }
  header p {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .toolbar {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    max-width: 1100px;
    margin: 0 auto 20px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .btn-group { display: flex; gap: 8px; }

  button {
    font-family: 'Crimson Pro', serif;
    font-size: 14px;
    padding: 8px 18px;
    border-radius: 4px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s;
    letter-spacing: 0.5px;
  }
  button:hover { background: var(--surface2); }
  .btn-reset { border-color: var(--red-border); color: var(--red); }
  .btn-reset:hover { background: var(--red-bg); }
  .btn-copy { background: var(--blue-bg); border-color: var(--blue-border); color: var(--blue); }
  .btn-copy:hover { background: rgba(58,143,209,0.18); }

  /* Region score panels */
  .region-scores {
    max-width: 1100px;
    margin: 0 auto 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .region-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .region-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
  }

  .region-label {
    font-family: 'Cinzel Decorative', serif;
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--text-muted);
  }
  .region-label.eu { color: var(--blue); }
  .region-label.na { color: var(--purple); }

  .region-limit {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .region-score-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 16px;
  }

  .rscore {
    font-family: 'Cinzel Decorative', serif;
    font-size: 32px;
    min-width: 36px;
    text-align: center;
  }
  .rscore.t1 { color: var(--team1); }
  .rscore.t2 { color: var(--team2); }
  .rscore-dash { font-family: 'Cinzel Decorative', serif; font-size: 22px; color: var(--text-dim); }

  .rwin-btns {
    display: flex;
    gap: 6px;
    padding: 0 16px 14px;
  }

  .rwin-btn {
    flex: 1;
    font-size: 12px;
    padding: 6px 8px;
    letter-spacing: 0.5px;
    text-align: center;
  }
  .rwin-btn.t1 { border-color: var(--blue-border); color: var(--blue); }
  .rwin-btn.t1:hover { background: var(--blue-bg); }
  .rwin-btn.t2 { border-color: var(--red-border); color: var(--red); }
  .rwin-btn.t2:hover { background: var(--red-bg); }

  /* Arena */
  .arena {
    max-width: 1100px;
    margin: 0 auto 28px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 16px;
    align-items: start;
  }

  .team-block { display: flex; flex-direction: column; gap: 10px; }

  .team-side-label {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    border-radius: 4px;
    margin-bottom: 2px;
  }
  .team-side-label.t1 { border: 1px solid var(--blue-border); background: var(--blue-bg); }
  .team-side-label.t2 { border: 1px solid var(--red-border); background: var(--red-bg); justify-content: flex-end; }

  .team-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .team-dot.t1 { background: var(--team1); }
  .team-dot.t2 { background: var(--team2); }

  .team-side-text {
    font-family: 'Cinzel Decorative', serif;
    font-size: 12px;
    letter-spacing: 1.5px;
  }
  .team-side-label.t1 .team-side-text { color: var(--blue); }
  .team-side-label.t2 .team-side-text { color: var(--red); }

  .player-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    transition: border-color 0.2s;
  }
  .player-card:hover { border-color: var(--border2); }

  .pc-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel Decorative', serif;
    font-size: 11px;
    flex-shrink: 0;
  }
  .avatar.t1 { background: var(--blue-bg); border: 1px solid var(--blue-border); color: var(--blue); }
  .avatar.t2 { background: var(--red-bg); border: 1px solid var(--red-border); color: var(--red); }

  .pname-input {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    font-size: 15px;
    padding: 2px 0;
    outline: none;
    transition: border-color 0.2s;
  }
  .pname-input:focus { border-bottom-color: var(--blue); }
  .pname-input.t2:focus { border-bottom-color: var(--red); }
  .pname-input::placeholder { color: var(--text-dim); }

  .pc-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .pstat {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px;
    text-align: center;
  }

  .pstat-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    display: block;
    margin-bottom: 6px;
  }

  .pstat-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .sbtn {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text-muted);
    font-size: 15px;
    cursor: pointer;
    padding: 0;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.1s, color 0.1s;
  }
  .sbtn:hover { background: var(--surface3); color: var(--text); }

  .sval {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    min-width: 22px;
    text-align: center;
    display: inline-block;
  }
  .sval.fb { color: var(--danger); }

  .vs-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding-top: 16px;
  }

  .vs-badge {
    font-family: 'Cinzel Decorative', serif;
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 2px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 4px;
    padding: 6px 14px;
  }

  /* Leaderboard */
  .lb-wrap {
    max-width: 1100px;
    margin: 0 auto;
    background: #1c1f2e;
    border: 1px solid #2e3350;
    border-radius: 6px;
    overflow: hidden;
  }

  .lb-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid #2e3350;
    background: #21253a;
  }
  .lb-title-left {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Cinzel Decorative', serif;
    font-size: 12px;
    color: #c8cfe8;
    letter-spacing: 1px;
  }
  .lb-title-left .icon { color: var(--gold); }
  .lb-subtitle { font-size: 11px; color: #7a85b0; letter-spacing: 1px; }

  .lb-head {
    display: grid;
    grid-template-columns: 44px 1fr 70px 70px 80px;
    padding: 10px 20px;
    background: #272b40;
    border-bottom: 1px solid #2e3350;
    gap: 8px;
  }
  .lb-head span {
    font-size: 11px;
    color: #7a85b0;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
    font-weight: 600;
  }
  .lb-head span:nth-child(2) { text-align: left; }

  .lb-row {
    display: grid;
    grid-template-columns: 44px 1fr 70px 70px 80px;
    padding: 13px 20px;
    border-bottom: 1px solid #252840;
    align-items: center;
    gap: 8px;
    transition: background 0.15s;
  }
  .lb-row:last-child { border-bottom: none; }
  .lb-row:hover { background: #232640; }
  .lb-row.gold-row { background: linear-gradient(90deg, rgba(196,154,68,0.12), rgba(196,154,68,0.04)); }

  .lb-rank { font-family: 'Cinzel Decorative', serif; font-size: 12px; text-align: center; color: #5a6080; }
  .lb-rank.r1 { color: #e8b84b; }
  .lb-rank.r2 { color: #c0c8e0; }
  .lb-rank.r3 { color: #c07848; }

  .lb-name-cell { display: flex; align-items: center; gap: 8px; }
  .lb-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .lb-name { font-size: 16px; color: #e8eaf8; font-weight: 500; }
  .lb-stat { font-size: 17px; font-weight: 600; text-align: center; color: #6ecfff; }
  .lb-fb { font-size: 17px; font-weight: 600; text-align: center; color: #ff7070; }
  .lb-kfb { font-size: 18px; font-weight: 700; text-align: center; color: #e8b84b; }

  .copy-notice {
    text-align: center;
    margin-top: 14px;
    font-size: 13px;
    color: var(--green);
    height: 20px;
    letter-spacing: 1px;
  }

  .footer {
    text-align: center;
    margin-top: 40px;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  @media (max-width: 680px) {
    .arena { grid-template-columns: 1fr; }
    .vs-col { flex-direction: row; padding: 0; }
    .region-scores { grid-template-columns: 1fr; }
    .lb-head, .lb-row { grid-template-columns: 36px 1fr 60px 60px 70px; padding: 8px 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-bar">
    <div class="header-line"></div>
    <h1>3V3 SCRIMS</h1>
    <div class="header-line right"></div>
  </div>
  <p>Score Tracker</p>
</header>

<div class="toolbar">
  <div class="btn-group">
    <button class="btn-reset" onclick="resetAll()">Reset All</button>
    <button class="btn-copy" onclick="copyResults()">Copy Results</button>
  </div>
</div>

<!-- EU and NA score panels -->
<div class="region-scores">
  <div class="region-panel">
    <div class="region-panel-header">
      <span class="region-label eu">EU</span>
      <span class="region-limit">First to 5 rounds</span>
    </div>
    <div class="region-score-row">
      <span class="rscore t1" id="eu1">0</span>
      <span class="rscore-dash">:</span>
      <span class="rscore t2" id="eu2">0</span>
    </div>
    <div class="rwin-btns">
      <button class="rwin-btn t1" onclick="addRegionWin('eu',1)">+ T1 Win</button>
      <button class="rwin-btn t2" onclick="addRegionWin('eu',2)">+ T2 Win</button>
    </div>
  </div>
  <div class="region-panel">
    <div class="region-panel-header">
      <span class="region-label na">NA</span>
      <span class="region-limit">First to 5 rounds</span>
    </div>
    <div class="region-score-row">
      <span class="rscore t1" id="na1">0</span>
      <span class="rscore-dash">:</span>
      <span class="rscore t2" id="na2">0</span>
    </div>
    <div class="rwin-btns">
      <button class="rwin-btn t1" onclick="addRegionWin('na',1)">+ T1 Win</button>
      <button class="rwin-btn t2" onclick="addRegionWin('na',2)">+ T2 Win</button>
    </div>
  </div>
</div>

<div class="arena">
  <!-- Team 1 -->
  <div class="team-block">
    <div class="team-side-label t1">
      <div class="team-dot t1"></div>
      <span class="team-side-text">Team 1</span>
    </div>
    <div id="t1players"></div>
  </div>

  <!-- VS -->
  <div class="vs-col">
    <div class="vs-badge">VS</div>
  </div>

  <!-- Team 2 -->
  <div class="team-block">
    <div class="team-side-label t2">
      <span class="team-side-text">Team 2</span>
      <div class="team-dot t2"></div>
    </div>
    <div id="t2players"></div>
  </div>
</div>

<!-- Leaderboard -->
<div class="lb-wrap">
  <div class="lb-title">
    <div class="lb-title-left">
      <span class="icon">&#9733;</span>
      Player Leaderboard
    </div>
    <div class="lb-subtitle">Ranked by K/FB ratio</div>
  </div>
  <div class="lb-head">
    <span>#</span>
    <span style="text-align:left">Player</span>
    <span>Kills</span>
    <span>1st Blood</span>
    <span>K/FB</span>
  </div>
  <div id="leaderboard"></div>
</div>

<div class="copy-notice" id="copyNotice"></div>
<div class="footer">3v3 Scrims &mdash; Competitive Tracker</div>

<script>
  const teams = [
    { players: [{ name:'', kills:0, fb:0 }, { name:'', kills:0, fb:0 }, { name:'', kills:0, fb:0 }] },
    { players: [{ name:'', kills:0, fb:0 }, { name:'', kills:0, fb:0 }, { name:'', kills:0, fb:0 }] }
  ];

  const regionScores = { eu: [0, 0], na: [0, 0] };

  function addRegionWin(region, team) {
    regionScores[region][team - 1]++;
    document.getElementById(region + '1').textContent = regionScores[region][0];
    document.getElementById(region + '2').textContent = regionScores[region][1];
  }

  function buildPlayers() {
    [1, 2].forEach(t => {
      const container = document.getElementById('t' + t + 'players');
      container.innerHTML = '';
      teams[t - 1].players.forEach((p, pi) => {
        const div = document.createElement('div');
        div.className = 'player-card';
        div.innerHTML = `
          <div class="pc-top">
            <div class="avatar t${t}" id="av${t}_${pi}">P${pi + 1}</div>
            <input class="pname-input t${t}" placeholder="Player ${pi + 1}" value="${p.name}"
              oninput="onPName(${t},${pi},this.value)" />
          </div>
          <div class="pc-stats">
            <div class="pstat">
              <span class="pstat-label">Kills</span>
              <div class="pstat-controls">
                <button class="sbtn" onclick="adj(${t},${pi},'kills',-1)">&#8722;</button>
                <span class="sval" id="k${t}_${pi}">0</span>
                <button class="sbtn" onclick="adj(${t},${pi},'kills',1)">+</button>
              </div>
            </div>
            <div class="pstat">
              <span class="pstat-label">1st Bloods</span>
              <div class="pstat-controls">
                <button class="sbtn" onclick="adj(${t},${pi},'fb',-1)">&#8722;</button>
                <span class="sval fb" id="fb${t}_${pi}">0</span>
                <button class="sbtn" onclick="adj(${t},${pi},'fb',1)">+</button>
              </div>
            </div>
          </div>
        `;
        container.appendChild(div);
      });
    });
  }

  function onPName(t, pi, val) {
    teams[t - 1].players[pi].name = val;
    const av = document.getElementById('av' + t + '_' + pi);
    av.textContent = val.trim() ? val.trim().slice(0, 2).toUpperCase() : 'P' + (pi + 1);
    renderLB();
  }

  function adj(t, pi, stat, delta) {
    const p = teams[t - 1].players[pi];
    p[stat] = Math.max(0, p[stat] + delta);
    document.getElementById('k' + t + '_' + pi).textContent = p.kills;
    document.getElementById('fb' + t + '_' + pi).textContent = p.fb;
    renderLB();
  }

  function kfbRatio(p) {
    if (p.fb === 0) return p.kills > 0 ? p.kills : 0;
    return parseFloat((p.kills / p.fb).toFixed(2));
  }

  function kfbDisplay(p) {
    if (p.fb === 0) return p.kills > 0 ? p.kills.toFixed(2) : '—';
    return (p.kills / p.fb).toFixed(2);
  }

  function renderLB() {
    const all = [];
    [0, 1].forEach(ti => {
      teams[ti].players.forEach((p, pi) => {
        all.push({ ...p, team: ti, pi });
      });
    });

    all.sort((a, b) => {
      const ra = kfbRatio(a), rb = kfbRatio(b);
      if (rb !== ra) return rb - ra;
      return b.kills - a.kills;
    });

    const medals = ['1st','2nd','3rd','4th','5th','6th'];
    const lb = document.getElementById('leaderboard');
    lb.innerHTML = all.map((p, rank) => {
      const name = p.name.trim() || 'Player ' + (p.pi + 1);
      const rankClass = rank < 3 ? 'r' + (rank + 1) : '';
      const rowClass = rank === 0 ? 'lb-row gold-row' : 'lb-row';
      const dotColor = p.team === 0 ? 'var(--team1)' : 'var(--team2)';
      const ratio = kfbDisplay(p);
      return `<div class="${rowClass}">
        <div class="lb-rank ${rankClass}">${medals[rank] || (rank + 1) + 'th'}</div>
        <div class="lb-name-cell"><div class="lb-dot" style="background:${dotColor}"></div><span class="lb-name">${name}</span></div>
        <div class="lb-stat">${p.kills}</div>
        <div class="lb-fb">${p.fb}</div>
        <div class="lb-kfb">${ratio}</div>
      </div>`;
    }).join('');
  }

  function resetAll() {
    if (!confirm('Reset everything? This cannot be undone.')) return;
    teams.forEach(t => t.players.forEach(p => { p.kills = 0; p.fb = 0; p.name = ''; }));
    regionScores.eu = [0, 0];
    regionScores.na = [0, 0];
    ['eu1','eu2','na1','na2'].forEach(id => document.getElementById(id).textContent = 0);
    buildPlayers();
    renderLB();
  }

  function copyResults() {
    const euS = regionScores.eu, naS = regionScores.na;
    const lines = [
      '⚔️  3V3 SCRIMS — RESULTS',
      '─────────────────────────────',
      '',
      `🌍 EU:  Team 1  ${euS[0]} — ${euS[1]}  Team 2`,
      `🌎 NA:  Team 1  ${naS[0]} — ${naS[1]}  Team 2`,
      ''
    ];

    [0, 1].forEach(ti => {
      lines.push(`[ Team ${ti + 1} ]`);
      teams[ti].players.forEach((p, pi) => {
        const name = p.name.trim() || 'Player ' + (pi + 1);
        lines.push(`  ${name} — Kills: ${p.kills}  |  1st Bloods: ${p.fb}  |  K/FB: ${kfbDisplay(p)}`);
      });
      lines.push('');
    });

    const all = [];
    [0, 1].forEach(ti => {
      teams[ti].players.forEach((p, pi) => {
        all.push({ ...p, team: ti, pi });
      });
    });
    all.sort((a, b) => {
      const ra = kfbRatio(a), rb = kfbRatio(b);
      if (rb !== ra) return rb - ra;
      return b.kills - a.kills;
    });

    lines.push('─────────────────────────────');
    lines.push('📊 Player Rankings (by K/FB)');
    const meds = ['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣'];
    all.forEach((p, i) => {
      const name = p.name.trim() || 'Player ' + (p.pi + 1);
      lines.push(`${meds[i] || (i+1)+'.'} ${name} (Team ${p.team + 1}) — ${p.kills}K / ${p.fb} FB / K/FB: ${kfbDisplay(p)}`);
    });

    navigator.clipboard.writeText(lines.join('\n')).then(() => {
      const n = document.getElementById('copyNotice');
      n.textContent = '✓ Results copied — paste directly into Discord';
      setTimeout(() => n.textContent = '', 3000);
    });
  }

  buildPlayers();
  renderLB();
